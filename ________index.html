<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Cartoon Chase</title>
    <style>
        /* Reset and center everything */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Mobile TikTok Canvas (9:16 ratio) */
        .tiktok-container {
            position: relative;
            width: 100vw;
            max-width: 400px;
            height: 100vh;
            max-height: 711px; /* Roughly 9:16 for desktop viewing */
            background: linear-gradient(to bottom, #87CEEB 40%, #FFE4B5 40%); /* Sky and Floor */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
        }

        /* Scenery */
        .wall {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 40px;
            height: 60%;
            background-color: #A0522D;
            border-right: 3px solid #6b361d;
        }

        .mouse-hole {
            position: absolute;
            left: 0;
            bottom: 20px;
            width: 35px;
            height: 50px;
            background-color: #111;
            border-radius: 50px 50px 0 0;
        }

        /* Text Overlay */
        .tiktok-text {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        /* Characters (Using Emojis for easy rendering) */
        .character {
            position: absolute;
            font-size: 60px; /* Big enough to see clearly */
            line-height: 1;
            user-select: none;
            z-index: 5;
        }

        .mouse { bottom: 20px; left: -100px; } /* Starts hidden in hole */
        .cheese { bottom: 20px; left: 150px; font-size: 40px; }
        .cat { top: -100px; right: -100px; font-size: 80px; }
        
        /* Crash Effects */
        .pow {
            position: absolute;
            bottom: 30px;
            left: 10px;
            font-size: 80px;
            opacity: 0;
            z-index: 6;
        }
        
        .stars {
            position: absolute;
            bottom: 80px;
            left: 20px;
            font-size: 40px;
            opacity: 0;
            z-index: 6;
        }

    </style>
</head>
<body>

    <div class="tiktok-container">
        <div class="tiktok-text" id="overlay-text">Wait for it... 😂</div>

        <div class="wall"></div>
        <div class="mouse-hole"></div>

        <div class="character cheese">🧀</div>
        <div class="character mouse">🐭</div>
        <div class="character cat">🐱</div>
        
        <div class="pow">💥</div>
        <div class="stars">💫</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Initialize GSAP Timeline
        // repeat: -1 makes it loop infinitely for TikTok
        const tl = gsap.timeline({ repeat: -1, repeatDelay: 1.5 });

        // Phase 1: The Setup
        // Mouse sneaks out to get the cheese
        tl.to('.mouse', { x: 120, duration: 1.5, ease: "power1.inOut" })
          .to('.mouse', { rotation: -10, yoyo: true, repeat: 3, duration: 0.2 }, "-=1.5") // Little walk waddle
          
          // Mouse inspects cheese
          .to('#overlay-text', { text: "Bro thought he was safe 💀", duration: 0, delay: 0.5 })
          
          // Cat drops in from the sky!
          .to('.cat', { x: -80, y: 350, duration: 0.6, ease: "bounce.out" })
          
          // Dramatic Pause - Cat sees mouse, Mouse freezes
          .to('.cat', { scale: 1.2, duration: 0.2 }) // Cat gets ready
          .to('.mouse', { scale: 1.2, duration: 0.2 }, "-=0.2") // Mouse gets scared
          .to({}, { duration: 0.8 }) // Hold the suspense

        // Phase 2: The Chase & Crash
          // Mouse grabs cheese and runs back to the hole
          .to(['.mouse', '.cheese'], { x: -20, duration: 0.4, ease: "power2.in" })
          
          // Cat leaps after the mouse
          .to('.cat', { x: -280, y: 380, duration: 0.35, ease: "power2.in" }, "-=0.35")
          
          // Cat misses the hole and hits the wall! (Squash effect)
          .to('.cat', { scaleX: 0.3, scaleY: 1.5, x: -310, duration: 0.1 })
          
          // Impact explosions!
          .to('.pow', { opacity: 1, scale: 1.5, duration: 0.1, ease: "back.out(3)" }, "-=0.1")
          
          // Cat bounces back and gets dizzy
          .to('.cat', { scaleX: 1, scaleY: 1, x: -250, y: 400, rotation: -90, duration: 0.3, ease: "power1.out" })
          .to('.pow', { opacity: 0, duration: 0.2 })
          
          // Dizzy stars appear
          .to('.stars', { opacity: 1, rotation: 360, duration: 1, ease: "none" })
          .to('#overlay-text', { text: "RIP Tom 😭", duration: 0 }, "-=1")

        // Phase 3: The Aftermath
          // Cat slowly slides off screen down the wall
          .to('.cat', { y: 600, duration: 1.5, ease: "power1.in" }, "+=0.5")
          .to('.stars', { opacity: 0, duration: 0.2 }, "-=1.5")
          
          // Reset text for the next loop
          .to('#overlay-text', { text: "Wait for it... 😂", duration: 0 });

    </script>
</body>
</html>
