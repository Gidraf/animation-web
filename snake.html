<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Realistic Procedural Snake</title>
  <style>
    body { margin: 0; background: #050810; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .container { position: relative; width: 100%; max-width: 500px; padding: 10px; }
    canvas { background: radial-gradient(circle at center, #0d162a 0%, #050810 100%); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); width: 100%; display: block; }
    .ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
    .timer-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #2ecc71; width: 100%; transition: width 0.1s linear; }
    .controls { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
    button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; backdrop-filter: blur(5px); }
    button:hover { background: #2ecc71; border-color: #2ecc71; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

<div class="container">
  <div class="ui">
    <div id="score">Length: 20</div>
  </div>
  <canvas id="snakeCanvas"></canvas>
  <div id="timer" class="timer-bar"></div>
  <div class="controls">
    <button onclick="toggleManual()">Toggle Manual/AI</button>
    <button onclick="resetGame()">Manual Reset</button>
  </div>
</div>

<script>
const canvas = document.getElementById('snakeCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const timerBar = document.getElementById('timer');

let w, h, snake, food, particles = [];
let isManual = false;
let lastEatTime = Date.now();
const RESET_TIME = 15000; // 15 seconds

function init() {
  w = canvas.width = 500;
  h = canvas.height = 700;
  
  snake = {
    pos: { x: w/2, y: h/2 },
    angle: Math.random() * Math.PI * 2,
    speed: 3,
    turnSpeed: 0.12,
    segments: [],
    history: [], // For breadcrumb pathing
    length: 25,
    thickness: 12,
    wave: 0,
    tongueOut: 0
  };

  // Pre-fill history
  for(let i=0; i<200; i++) {
    snake.history.push({x: snake.pos.x, y: snake.pos.y});
  }
  
  spawnFood();
}

function spawnFood() {
  food = {
    x: 50 + Math.random() * (w - 100),
    y: 50 + Math.random() * (h - 100),
    size: 0,
    color: `hsl(${Math.random() * 360}, 70%, 60%)`
  };
  gsap.to(food, { size: 8, duration: 0.5, ease: "back.out(3)" });
}

function resetGame() {
  gsap.to("body", { opacity: 0, duration: 0.3, onComplete: () => {
    init();
    lastEatTime = Date.now();
    gsap.to("body", { opacity: 1, duration: 0.3 });
  }});
}

const keys = {};
window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

function update() {
  // Auto-Reset Logic
  let elapsed = Date.now() - lastEatTime;
  timerBar.style.width = (1 - (elapsed / RESET_TIME)) * 100 + "%";
  if (elapsed > RESET_TIME) resetGame();

  // AI or Manual steering
  if (isManual) {
    if (keys['a'] || keys['arrowleft']) snake.angle -= snake.turnSpeed;
    if (keys['d'] || keys['arrowright']) snake.angle += snake.turnSpeed;
  } else {
    // Simple steering AI
    let targetAngle = Math.atan2(food.y - snake.pos.y, food.x - snake.pos.x);
    let diff = targetAngle - snake.angle;
    while (diff < -Math.PI) diff += Math.PI * 2;
    while (diff > Math.PI) diff -= Math.PI * 2;
    snake.angle += diff * 0.1;
  }

  // Realistic Slither Wave
  snake.wave += 0.15;
  let waveOffset = Math.sin(snake.wave) * 1.5;

  // Move head
  snake.pos.x += Math.cos(snake.angle + (waveOffset * 0.1)) * snake.speed;
  snake.pos.y += Math.sin(snake.angle + (waveOffset * 0.1)) * snake.speed;

  // Screen Wrap
  if(snake.pos.x < 0) snake.pos.x = w;
  if(snake.pos.x > w) snake.pos.x = 0;
  if(snake.pos.y < 0) snake.pos.y = h;
  if(snake.pos.y > h) snake.pos.y = 0;

  // Update History (Pathing)
  snake.history.unshift({ x: snake.pos.x, y: snake.pos.y });
  if (snake.history.length > 500) snake.history.pop();

  // Check Food Collision
  let dist = Math.hypot(snake.pos.x - food.x, snake.pos.y - food.y);
  if (dist < 20) {
    snake.length += 5;
    lastEatTime = Date.now();
    scoreEl.innerText = `Length: ${snake.length}`;
    spawnFood();
  }

  // Flickering Tongue
  if (Math.random() > 0.98) snake.tongueOut = 20;
  if (snake.tongueOut > 0) snake.tongueOut--;
}

function draw() {
  ctx.clearRect(0, 0, w, h);

  // Draw Food
  ctx.shadowBlur = 15;
  ctx.shadowColor = food.color;
  ctx.fillStyle = food.color;
  ctx.beginPath();
  ctx.arc(food.x, food.y, food.size, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Draw Snake Body
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  // We draw the body by sampling points from the head's history
  for (let i = 0; i < snake.length; i++) {
    const pointIndex = i * 3; 
    const p = snake.history[pointIndex];
    if (!p) break;

    // Tapering thickness
    const size = Math.max(2, snake.thickness * (1 - i / snake.length));
    
    // Slight color shift for "scales"
    ctx.fillStyle = i === 0 ? "#4ade80" : `rgb(46, ${204 - i}, 113)`;
    
    // Side-to-side muscular movement
    const lateralShift = Math.sin(snake.wave - i * 0.3) * (i * 0.5);
    const angleAtPoint = Math.atan2(
      snake.history[pointIndex].y - (snake.history[pointIndex+1]?.y || 0),
      snake.history[pointIndex].x - (snake.history[pointIndex+1]?.x || 0)
    );

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(angleAtPoint);
    
    // Draw Segment
    ctx.beginPath();
    ctx.roundRect(-size/2, -size/2 + lateralShift, size, size, size/2);
    ctx.fill();

    // Draw Head Details
    if (i === 0) {
      // Eyes
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(2, -4, 3, 0, Math.PI*2);
      ctx.arc(2, 4, 3, 0, Math.PI*2);
      ctx.fill();
      
      // Tongue
      if (snake.tongueOut > 0) {
        ctx.strokeStyle = "#ff4757";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(8, 0);
        ctx.lineTo(15 + Math.sin(snake.wave * 2) * 3, 0);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

function toggleManual() {
  isManual = !isManual;
  lastEatTime = Date.now(); // Reset timer on mode switch
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>
