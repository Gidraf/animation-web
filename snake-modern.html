<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SERPENT</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body {
  background:#000;
  width:100%; height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Courier New',monospace;
}
#wrap { position:relative; }
canvas { display:block; }
#mode-btn {
  position:absolute;
  bottom:12px; left:50%;
  transform:translateX(-50%);
  background:rgba(0,255,136,0.08);
  border:1px solid rgba(0,255,136,0.25);
  color:rgba(0,255,136,0.65);
  font:bold 10px 'Courier New',monospace;
  padding:6px 18px;
  border-radius:20px;
  cursor:pointer;
  letter-spacing:2px;
  white-space:nowrap;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <button id="mode-btn">✦ AI MODE ✦</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('mode-btn');

const W = 420, H = 746;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  const wrap = document.getElementById('wrap');
  wrap.style.width  = W*s + 'px';
  wrap.style.height = H*s + 'px';
  canvas.style.width  = W*s + 'px';
  canvas.style.height = H*s + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── CONSTANTS ───────────────────────────────────────
const PI2 = Math.PI * 2;
const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const dist  = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);

// ─── SNAKE ───────────────────────────────────────────
const snake = {
  x: W/2, y: H/2.5,
  angle: Math.PI * 0.5,
  speed: 2.3,
  turnSpeed: 0.07,
  history: [],
  segments: 65,
  targetSeg: 65,
  wave: 0,
  tongueT: 0,
  eatFlash: 0,
  score: 0,
};
for (let i = 0; i < 3000; i++) snake.history.push({ x: W/2, y: H/2.5 });

// ─── FOOD ─────────────────────────────────────────────
const foods = [];
function spawnFood() {
  const m = 65;
  foods.push({
    x: m + Math.random()*(W-m*2),
    y: m + Math.random()*(H-m*2),
    hue: Math.floor(Math.random()*7)*52,   // 7 vivid hues
    pulse: Math.random()*PI2,
    r: 0, targetR: 8,
  });
}
for (let i = 0; i < 7; i++) spawnFood();

// ─── PARTICLES ───────────────────────────────────────
const parts = [];
function addPart(x,y,vx,vy,hue,r,life,type='dot') {
  parts.push({x,y,vx,vy,hue,r,life,maxLife:life,type});
}
function burst(x, y, hue, n=28) {
  for (let i=0; i<n; i++) {
    const a = PI2*i/n + (Math.random()-.5)*.8;
    const sp = 2 + Math.random()*4;
    addPart(x,y, Math.cos(a)*sp, Math.sin(a)*sp, hue+(Math.random()-.5)*35, 2+Math.random()*3.5, .9+Math.random()*.5, 'dot');
  }
  // Shockwave ring
  parts.push({x,y, vx:0,vy:0, hue, r:0, maxR:55, life:1, maxLife:1, type:'wave'});
  // Central flash
  parts.push({x,y, vx:0,vy:0, hue, r:40, life:1, maxLife:1, type:'flash'});
}

// Ambient bioluminescent spores
const spores = Array.from({length:70}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  vx: (Math.random()-.5)*.18, vy: -(Math.random()*.28+.05),
  r: Math.random()*1.8+.3,
  hue: 160+Math.random()*90,
  a: Math.random()*.3+.04,
}));

// Background stars
const stars = Array.from({length:130}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.3+.2,
  a: Math.random()*.28+.05,
  tw: Math.random()*PI2,
}));

// Score popups
const popups = [];

// ─── INPUT ───────────────────────────────────────────
const keys = {};
let manual = false;
let touchX = null, touchY = null;
let combo = 0, comboT = 0;

btn.addEventListener('click', toggleMode);
function toggleMode() {
  manual = !manual;
  btn.textContent = manual ? '✦ MANUAL ✦' : '✦ AI MODE ✦';
}
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') toggleMode();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0], rect = canvas.getBoundingClientRect();
  const s = W / rect.width;
  touchX = (t.clientX - rect.left)*s;
  touchY = (t.clientY - rect.top)*s;
  if (!manual) toggleMode();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0], rect = canvas.getBoundingClientRect();
  const s = W / rect.width;
  touchX = (t.clientX - rect.left)*s;
  touchY = (t.clientY - rect.top)*s;
}, {passive:false});
canvas.addEventListener('touchend', () => { touchX = null; touchY = null; });

// ─── STEERING HELPER ─────────────────────────────────
function steerToward(tx, ty, str) {
  let diff = Math.atan2(ty-snake.y, tx-snake.x) - snake.angle;
  while (diff < -Math.PI) diff += PI2;
  while (diff > Math.PI) diff -= PI2;
  snake.angle += diff * str;
}

// ─── UPDATE ──────────────────────────────────────────
let frame = 0;

function getNearestFood() {
  let best = null, bd = Infinity;
  for (const f of foods) {
    if (f.r < 3) continue;
    const d = Math.hypot(f.x-snake.x, f.y-snake.y);
    if (d < bd) { bd=d; best=f; }
  }
  return best;
}

function update() {
  frame++;
  snake.wave += 0.13;

  // Tongue flicker
  if (snake.tongueT <= 0 && Math.random() < .008) snake.tongueT = 28 + Math.random()*18;
  if (snake.tongueT > 0) snake.tongueT--;
  if (snake.eatFlash > 0) snake.eatFlash--;
  if (comboT > 0) comboT--; else combo = 0;

  // ── Steering ──
  if (manual && touchX !== null) {
    steerToward(touchX, touchY, 0.13);
  } else if (manual) {
    if (keys['a']||keys['arrowleft'])  snake.angle -= snake.turnSpeed;
    if (keys['d']||keys['arrowright']) snake.angle += snake.turnSpeed;
  } else {
    const target = getNearestFood();
    if (target) {
      const d = Math.hypot(target.x-snake.x, target.y-snake.y);
      steerToward(target.x, target.y, clamp(0.045 + 5/d, 0.045, 0.13));
    }
    // Gentle edge nudge (keeps snake visible)
    const m = 50;
    if (snake.x < m)   snake.angle += .07;
    if (snake.x > W-m) snake.angle -= .07;
    if (snake.y < m)   snake.angle += .07;
    if (snake.y > H-m) snake.angle -= .07;
  }

  // Slithering motion
  const slither = Math.sin(snake.wave) * 0.065 + Math.sin(frame*.007) * 0.025;
  snake.x += Math.cos(snake.angle + slither) * snake.speed;
  snake.y += Math.sin(snake.angle + slither) * snake.speed;

  // Wrap
  snake.x = ((snake.x % W) + W) % W;
  snake.y = ((snake.y % H) + H) % H;

  // History
  snake.history.unshift({ x: snake.x, y: snake.y });
  const maxH = snake.targetSeg * 3 + 400;
  if (snake.history.length > maxH) snake.history.length = maxH;

  // Grow visually
  if (snake.segments < snake.targetSeg) snake.segments += 0.4;

  // Food update
  for (const f of foods) {
    if (f.r < f.targetR) f.r = Math.min(f.targetR, f.r + 0.35);
    f.pulse += 0.045;
  }

  // Food collision
  for (let i = foods.length-1; i >= 0; i--) {
    const f = foods[i];
    if (f.r < 4) continue;
    if (Math.hypot(snake.x-f.x, snake.y-f.y) < f.r + 16) {
      burst(f.x, f.y, f.hue, 30);
      combo = comboT > 0 ? combo+1 : 1;
      comboT = 160;
      snake.targetSeg += 12;
      snake.score++;
      snake.eatFlash = 20;
      popups.push({
        x: f.x, y: f.y - 10,
        text: combo >= 3 ? `🔥 ${combo}x COMBO!` : combo===2 ? `x2 COMBO!` : `+12`,
        hue: combo >= 3 ? 45 : combo===2 ? 60 : f.hue,
        life: 1.0, vy: -1.5
      });
      foods.splice(i, 1);
      spawnFood();
    }
  }

  // Trail sparkles from head
  if (frame % 5 === 0) {
    addPart(
      snake.x + (Math.random()-.5)*10,
      snake.y + (Math.random()-.5)*10,
      (Math.random()-.5)*.5, (Math.random()-.5)*.5,
      130 + Math.random()*50, 1.5+Math.random()*2, .45+Math.random()*.3, 'sparkle'
    );
  }

  // Particles
  for (let i = parts.length-1; i >= 0; i--) {
    const p = parts[i];
    if (p.type === 'wave') {
      p.r = (1 - p.life) * p.maxR;
      p.life -= 0.038;
    } else if (p.type === 'flash') {
      p.life -= 0.07;
    } else {
      p.x += p.vx; p.y += p.vy;
      p.vx *= .93; p.vy *= .93;
      p.life -= 0.022;
    }
    if (p.life <= 0) parts.splice(i, 1);
  }

  // Spores
  for (const s of spores) {
    s.x += s.vx; s.y += s.vy;
    if (s.y < -5) { s.y = H+5; s.x = Math.random()*W; }
  }

  // Popups
  for (let i = popups.length-1; i >= 0; i--) {
    popups[i].y += popups[i].vy;
    popups[i].life -= .019;
    if (popups[i].life <= 0) popups.splice(i, 1);
  }
}

// ─── DRAW: BACKGROUND ────────────────────────────────
function drawBg() {
  const g = ctx.createRadialGradient(W/2, H*.3, 0, W/2, H*.65, H*.9);
  g.addColorStop(0,  '#0d2040');
  g.addColorStop(.45,'#070f1e');
  g.addColorStop(1,  '#020508');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Nebula wisps
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < 3; i++) {
    const nx = W*.15 + i*W*.35, ny = H*.2 + i*H*.1;
    const ng = ctx.createRadialGradient(nx,ny,0,nx,ny,120+i*40);
    ng.addColorStop(0,`hsla(${190+i*30},80%,30%,0.07)`);
    ng.addColorStop(1,'transparent');
    ctx.fillStyle = ng;
    ctx.fillRect(0,0,W,H);
  }
  ctx.restore();

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.a * (.6 + .4*Math.sin(s.tw + frame*.012));
    ctx.fillStyle = '#c8e8ff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, PI2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Bioluminescent spores
  for (const s of spores) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = `hsl(${s.hue},75%,68%)`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, PI2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── DRAW: FOOD ───────────────────────────────────────
function drawFood() {
  for (const f of foods) {
    if (f.r < .5) continue;
    const { x, y, hue, r, pulse } = f;

    // Expanding ripple rings
    for (let ri = 0; ri < 3; ri++) {
      const ph = (pulse*.85 + ri*PI2/3) % PI2;
      const a  = .32 * (1 - ph/PI2);
      ctx.globalAlpha = Math.max(0, a);
      ctx.strokeStyle = `hsl(${hue},100%,65%)`;
      ctx.lineWidth   = 1.3;
      ctx.beginPath();
      ctx.arc(x, y, r*(1.3+ph*1.3), 0, PI2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Outer glow
    ctx.shadowBlur  = 28;
    ctx.shadowColor = `hsl(${hue},100%,55%)`;

    // Core orb gradient
    const og = ctx.createRadialGradient(x-r*.3,y-r*.3,0, x,y,r*2.2);
    og.addColorStop(0,   `hsl(${hue},100%,97%)`);
    og.addColorStop(.3,  `hsl(${hue},100%,68%)`);
    og.addColorStop(.65, `hsl(${hue},90%,42%)`);
    og.addColorStop(1,   `hsla(${hue},80%,28%,0)`);
    ctx.fillStyle = og;
    ctx.beginPath();
    ctx.arc(x, y, r*2.2, 0, PI2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Specular highlight (bob animation)
    ctx.globalAlpha = .9;
    ctx.fillStyle   = 'rgba(255,255,255,.92)';
    ctx.beginPath();
    ctx.arc(x - r*.3, y - r*.3 + Math.sin(pulse*1.8)*.7, r*.22, 0, PI2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ─── DRAW: SNAKE BODY ────────────────────────────────
// Sample point at body segment index i
function bp(i) {
  return snake.history[Math.min(i*2, snake.history.length-1)];
}
// Thickness at segment i
function bt(i, total) {
  if (total === 0) return 0;
  const ramp  = Math.min(1, i / 2);               // ramp at neck
  const taper = Math.pow(1 - i/total, 0.38);      // tail taper
  return 15 * ramp * taper;
}
// Color at segment i: emerald head → deep teal tail
function bc(i, total) {
  const t = i/total;
  return { h: 130+t*35, s: 78-t*12, l: 52-t*20 };
}

function drawSnake() {
  const total = Math.min(Math.floor(snake.segments), Math.floor(snake.history.length/2) - 1);
  if (total < 2) return;

  // ── Pass 1: Outer glow (screen blend) ──
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = total; i >= 0; i--) {
    const p = bp(i); if (!p) continue;
    const th = bt(i, total); if (th < 1) continue;
    const {h,s,l} = bc(i, total);
    const gr = th * 2.2;
    ctx.globalAlpha = .13 * (1 - i/total*.55);
    const g = ctx.createRadialGradient(p.x,p.y,0, p.x,p.y,gr);
    g.addColorStop(0, `hsl(${h},${s+10}%,${l+28}%)`);
    g.addColorStop(1, `hsla(${h},${s}%,${l}%,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x, p.y, gr, 0, PI2);
    ctx.fill();
  }
  ctx.restore();

  // ── Pass 2: Main body (filled circles) ──
  ctx.save();
  for (let i = total; i >= 0; i--) {
    const p = bp(i); if (!p) continue;
    const th = bt(i, total); if (th < .5) continue;
    const {h,s,l} = bc(i, total);
    ctx.globalAlpha = .97;
    ctx.fillStyle   = `hsl(${h},${s}%,${l}%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, th, 0, PI2);
    ctx.fill();
  }
  ctx.restore();

  // ── Pass 3: Scale ridges ──
  ctx.save();
  for (let i = 3; i < total-1; i += 4) {
    const p  = bp(i);
    const p2 = bp(i+1);
    if (!p || !p2) continue;
    const th = bt(i, total); if (th < 6) break;
    const angle = Math.atan2(p2.y-p.y, p2.x-p.x);
    const {h} = bc(i, total);
    ctx.globalAlpha = .22;
    ctx.strokeStyle = `hsl(${h+22},82%,72%)`;
    ctx.lineWidth   = .75;
    // Paired scale arcs (left & right)
    for (const side of [-1,1]) {
      ctx.beginPath();
      ctx.arc(
        p.x + Math.cos(angle+side*Math.PI/2)*th*.35,
        p.y + Math.sin(angle+side*Math.PI/2)*th*.35,
        th*.7, angle+Math.PI*.6, angle+Math.PI*1.4
      );
      ctx.stroke();
    }
  }
  ctx.restore();

  // ── Pass 4: Dorsal highlight streak ──
  ctx.save();
  for (let i = total; i >= 2; i--) {
    const p  = bp(i);
    const p2 = bp(i-1);
    if (!p || !p2) continue;
    const th = bt(i, total); if (th < 5) continue;
    const ang = Math.atan2(p2.y-p.y, p2.x-p.x);
    const ox  = Math.cos(ang+Math.PI/2)*th*.3;
    const oy  = Math.sin(ang+Math.PI/2)*th*.3;
    ctx.globalAlpha = .21*(1-i/total*.75);
    ctx.fillStyle   = 'rgba(210,255,230,.7)';
    ctx.beginPath();
    ctx.arc(p.x+ox, p.y+oy, th*.22, 0, PI2);
    ctx.fill();
  }
  ctx.restore();

  // ── Pass 5: Head ──
  drawHead();
}

function drawHead() {
  const p0 = bp(0), p1 = bp(1);
  if (!p0 || !p1) return;
  const angle = Math.atan2(p0.y-p1.y, p0.x-p1.x);

  ctx.save();
  ctx.translate(p0.x, p0.y);
  ctx.rotate(angle);

  // Head glow pulse (yellow-white flash on eat)
  ctx.shadowBlur  = 32;
  ctx.shadowColor = snake.eatFlash > 0 ? `hsl(60,100%,70%)` : `#00ff88`;

  // Head shape: main ellipse + snout bump
  const hg = ctx.createLinearGradient(-13,0,16,0);
  hg.addColorStop(0,   '#1a7840');
  hg.addColorStop(.38, '#27ae60');
  hg.addColorStop(.72, '#52e08a');
  hg.addColorStop(1,   '#8fffc0');
  ctx.fillStyle = hg;

  ctx.beginPath();
  ctx.ellipse(0,  0, 15, 11, 0, 0, PI2);
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(10, 0, 7, 7,  0, 0, PI2);
  ctx.fill();

  ctx.shadowBlur = 0;

  // Head scale arc
  ctx.globalAlpha = .28;
  ctx.strokeStyle = 'rgba(190,255,215,.85)';
  ctx.lineWidth   = .75;
  ctx.beginPath();
  ctx.arc(1, 0, 10, Math.PI*.55, Math.PI*1.45);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // ── Eyes ──
  for (const ey of [-5.5, 5.5]) {
    // Dark socket
    ctx.fillStyle = '#0b3d1e';
    ctx.beginPath(); ctx.arc(5, ey, 4.8, 0, PI2); ctx.fill();

    // Sclera
    ctx.fillStyle = '#e0f8ea';
    ctx.beginPath(); ctx.arc(5, ey, 3.5, 0, PI2); ctx.fill();

    // Iris (glowing teal)
    const iris = ctx.createRadialGradient(5,ey,0, 5,ey,2.8);
    iris.addColorStop(0,   'rgba(0,220,100,.9)');
    iris.addColorStop(.6,  'rgba(0,150,70,.85)');
    iris.addColorStop(1,   'rgba(0,80,40,.6)');
    ctx.fillStyle = iris;
    ctx.beginPath(); ctx.arc(5.2, ey, 2.7, 0, PI2); ctx.fill();

    // Vertical slit pupil
    ctx.fillStyle = '#050a05';
    ctx.beginPath(); ctx.ellipse(5.5, ey, 1.1, 2.4, 0.12, 0, PI2); ctx.fill();

    // Specular
    ctx.fillStyle = 'rgba(255,255,255,.92)';
    ctx.beginPath(); ctx.arc(4.4, ey-1.2, 1.1, 0, PI2); ctx.fill();

    // Iris rim
    ctx.globalAlpha = .4;
    ctx.strokeStyle = 'rgba(120,255,170,.7)';
    ctx.lineWidth   = .6;
    ctx.beginPath(); ctx.arc(5, ey, 3.5, 0, PI2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ── Tongue ──
  if (snake.tongueT > 0 && snake.tongueT < 46) {
    const tLen = Math.abs(Math.sin(snake.tongueT * .28)) * 15;
    if (tLen > 2) {
      ctx.shadowBlur  = 10;
      ctx.shadowColor = '#ff1a44';
      ctx.strokeStyle = '#ff1a44';
      ctx.lineWidth   = 1.9;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(14, 0);
      ctx.lineTo(14+tLen, 0);
      ctx.stroke();
      // Fork
      for (const fa of [-.4, .4]) {
        ctx.beginPath();
        ctx.moveTo(14+tLen, 0);
        ctx.lineTo(14+tLen + Math.cos(fa)*5.5, Math.sin(fa)*5.5);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
    }
  }

  // Eat flash aura
  if (snake.eatFlash > 0) {
    const ef = snake.eatFlash / 20;
    ctx.globalAlpha = ef * .3;
    const ag = ctx.createRadialGradient(0,0,0, 0,0,24);
    ag.addColorStop(0, 'rgba(255,255,130,.9)');
    ag.addColorStop(1, 'rgba(255,200,0,0)');
    ctx.fillStyle = ag;
    ctx.beginPath(); ctx.arc(0,0,24,0,PI2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ─── DRAW: PARTICLES ─────────────────────────────────
function drawParticles() {
  for (const p of parts) {
    ctx.globalAlpha = Math.max(0, p.life);

    if (p.type === 'wave') {
      ctx.globalAlpha = p.life * .28;
      ctx.strokeStyle = `hsl(${p.hue},100%,70%)`;
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, PI2);
      ctx.stroke();

    } else if (p.type === 'flash') {
      const fl = ctx.createRadialGradient(p.x,p.y,0, p.x,p.y,p.r);
      fl.addColorStop(0,   `hsla(${p.hue},100%,95%,${p.life*.55})`);
      fl.addColorStop(.5,  `hsla(${p.hue},100%,70%,${p.life*.25})`);
      fl.addColorStop(1,   `hsla(${p.hue},100%,50%,0)`);
      ctx.globalAlpha = p.life;
      ctx.fillStyle   = fl;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, PI2);
      ctx.fill();

    } else {
      ctx.globalAlpha = Math.pow(p.life, 1.25);
      ctx.shadowBlur  = p.type==='dot' ? 8 : 3;
      ctx.shadowColor = `hsl(${p.hue},100%,58%)`;
      ctx.fillStyle   = `hsl(${p.hue},100%,72%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r*p.life, 0, PI2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur  = 0;
}

// ─── DRAW: UI ─────────────────────────────────────────
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w,y, x+w,y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x,y+h, x,y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x,y, x+r,y, r);
  ctx.closePath();
}

function drawUI() {
  // ── Vignette ──
  const vg = ctx.createRadialGradient(W/2,H/2,H*.2, W/2,H/2,H*.78);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,.6)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,W,H);

  // ── Score card ──
  ctx.save();
  roundRect(W/2-68, 16, 136, 48, 13);
  ctx.fillStyle   = 'rgba(0,8,20,.65)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,136,.2)';
  ctx.lineWidth   = 1;
  ctx.stroke();

  ctx.font      = 'bold 9px "Courier New",monospace';
  ctx.fillStyle = 'rgba(0,255,136,.48)';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '2px';
  ctx.fillText('LENGTH', W/2, 31);

  ctx.font        = 'bold 24px "Courier New",monospace';
  ctx.fillStyle   = '#7fffaa';
  ctx.shadowBlur  = 14;
  ctx.shadowColor = '#00ff88';
  ctx.fillText(Math.floor(snake.targetSeg), W/2, 56);
  ctx.restore();

  // ── Combo bar ──
  if (combo >= 2 && comboT > 0) {
    const pulse = .7 + .3*Math.sin(frame*.18);
    ctx.save();
    ctx.globalAlpha = Math.min(1, comboT/30) * pulse;
    const fs = combo >= 5 ? 20 : 16;
    ctx.font        = `bold ${fs}px "Courier New",monospace`;
    ctx.fillStyle   = combo>=5 ? '#ff9500' : '#ffe000';
    ctx.textAlign   = 'center';
    ctx.shadowBlur  = 18;
    ctx.shadowColor = combo>=5 ? '#ff6600' : '#ffaa00';
    ctx.fillText(`🔥 ${combo}x COMBO`, W/2, 78);
    ctx.restore();
  }

  // ── Floating score popups ──
  for (const p of popups) {
    ctx.save();
    ctx.globalAlpha = Math.pow(p.life, 1.4);
    ctx.font        = `bold ${p.text.includes('COMBO') ? 17 : 14}px "Courier New",monospace`;
    ctx.fillStyle   = `hsl(${p.hue},100%,74%)`;
    ctx.textAlign   = 'center';
    ctx.shadowBlur  = 12;
    ctx.shadowColor = `hsl(${p.hue},100%,58%)`;
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  }

  // ── Watermark ──
  ctx.save();
  ctx.globalAlpha = .28;
  ctx.font        = 'bold 9px "Courier New",monospace';
  ctx.fillStyle   = 'rgba(0,255,136,.9)';
  ctx.textAlign   = 'center';
  ctx.fillText('🐍 SERPENT', W/2, H-14);
  ctx.restore();
}

// ─── MAIN LOOP ────────────────────────────────────────
function loop() {
  update();
  drawBg();
  drawFood();
  drawSnake();
  drawParticles();
  drawUI();
  requestAnimationFrame(loop);
}

loop();
</script>
