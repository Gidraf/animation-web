<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Catch the Name - High Speed</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c; --gold-l: #e8c96a; 
    --bg: #0d0e14; --surface: #14161f; --border: #1f2233;
    --text: #f0ece4; --muted: #6b6e80;
  }
  
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; 
  }

  .bg-glow {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(201,168,76,0.08), transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .grid-bg {
    position: absolute; inset: 0; pointer-events: none;
    background-image: linear-gradient(rgba(201,168,76,.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(201,168,76,.03) 1px, transparent 1px);
    background-size: 40px 40px; z-index: 0;
  }

  #header {
    position: absolute; top: 10%; width: 100%; text-align: center; z-index: 10;
  }
  .title-eyebrow {
    font-size: 0.75rem; font-weight: 700; color: var(--gold);
    letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px;
    opacity: 0;
  }
  .title-main {
    font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 900;
    background: linear-gradient(135deg, #f0ece4 30%, var(--gold-l));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    opacity: 0; transform: translateY(10px);
  }

  #stage {
    position: relative; z-index: 20;
    display: flex; gap: 4px;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 900;
  }
  
  .letter {
    display: inline-block;
    color: var(--text);
    position: relative; 
    opacity: 0;
    text-shadow: 0 0 0px rgba(201,168,76,0);
    transition: text-shadow 0.2s ease, color 0.2s ease;
  }
  
  .letter.formed {
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
  }

  #controls {
    position: absolute; bottom: 10%; z-index: 30; opacity: 0;
  }
  .btn {
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--gold), #9a7420);
    color: #0d0e14; border: none; border-radius: 50px;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.8rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 5px 20px rgba(201,168,76,.26);
    transition: transform 0.2s;
  }
  .btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="grid-bg"></div>

  <div id="header">
    <div class="title-eyebrow" id="eyebrow">Fast & precise</div>
    <div class="title-main" id="title">Kenya</div>
  </div>

  <div id="stage"></div>

  <div id="controls">
    <button class="btn" style="visibility: hidden;" onclick="runSequence()">↻ Replay</button>
  </div>

<script>
  // --- CONFIGURATION ---
  const TARGET_NAME = "KENYA";
  const CHAOS_DURATION_BEFORE_CATCH = 1.2;  // Reduced from 3s to 1.2s
  const HOLD_NAME_DURATION = 1.5;           // Reduced from 2s to 1.5s
  // ---------------------

  const stage = document.getElementById('stage');
  let letters = [];
  let chaosTweens = [];

  function init() {
    stage.innerHTML = '';
    letters = [];
    
    TARGET_NAME.split('').forEach(char => {
      const span = document.createElement('span');
      span.className = 'letter';
      span.innerText = char === ' ' ? '\u00A0' : char; 
      stage.appendChild(span);
      letters.push(span);
    });

    // Sped up intro slightly
    gsap.to('#eyebrow', { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' });
    gsap.to('#title', { opacity: 1, y: 0, duration: 0.6, delay: 0.1, ease: 'back.out(1.5)' });
    gsap.to('#controls', { opacity: 1, duration: 0.6, delay: 0.5 });
  }

  function startChaos(initialSpawn = true) {
    const viewportW = window.innerWidth / 2;
    const viewportH = window.innerHeight / 2;

    letters.forEach(letter => {
      letter.classList.remove('formed');

      if (initialSpawn) {
        const startY = Math.random() > 0.5 ? -viewportH - 100 : viewportH + 100;
        const startX = (Math.random() - 0.5) * viewportW;
        gsap.set(letter, { x: startX, y: startY, opacity: 1, rotation: Math.random() * 360 });
      }

      const tween = gsap.to(letter, {
        x: "random(-" + viewportW * 0.8 + ", " + viewportW * 0.8 + ")",
        y: "random(-" + viewportH * 0.8 + ", " + viewportH * 0.8 + ")",
        rotation: "random(-360, 360)",
        duration: "random(0.3, 0.7)", // MUCH FASTER: Was 1.2 to 2.5
        ease: "sine.inOut",
        repeat: -1, 
        yoyo: true,
        repeatRefresh: true
      });
      
      chaosTweens.push(tween);
    });
  }

  function formName() {
    chaosTweens.forEach(t => t.kill());
    chaosTweens = [];

    gsap.to(letters, {
      x: 0,
      y: 0,
      rotation: 0,
      duration: 0.35, // MUCH FASTER: Was 1.2. This is what gives it that instant snap!
      ease: "back.out(1.2)", // Switched from elastic for a tighter, quicker settle
      stagger: {
        amount: 0.1,     // FASTER: Reduced from 0.3
        from: "center"   
      },
      onComplete: () => {
        letters.forEach(l => l.classList.add('formed'));
        
        gsap.fromTo('#title', 
          { scale: 1 }, 
          { scale: 1.05, duration: 0.2, yoyo: true, repeat: 1, ease: "power1.inOut" }
        );
      }
    });
  }

  async function runSequence() {
    document.querySelector('.btn').style.pointerEvents = 'none';
    document.querySelector('.btn').style.opacity = '0.5';

    chaosTweens.forEach(t => t.kill());
    chaosTweens = [];

    startChaos(true);

    await new Promise(r => setTimeout(r, CHAOS_DURATION_BEFORE_CATCH * 1000));

    formName();

    await new Promise(r => setTimeout(r, (HOLD_NAME_DURATION + 0.15) * 500));

    startChaos(false);

    document.querySelector('.btn').style.pointerEvents = 'auto';
    document.querySelector('.btn').style.opacity = '1';
  }

  window.addEventListener('load', () => {
    init();
    setTimeout(runSequence, 300); 
  });
</script>
</body>
</html>
